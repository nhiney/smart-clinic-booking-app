name: smart_clinic_booking
description: Smart Clinic Booking Mobile App
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  lottie: ^3.1.0
  cupertino_icons: ^1.0.8
  syncfusion_flutter_pdfviewer: ^33.1.46
  file_picker: ^8.1.7

  # State Management
  provider: ^6.1.2
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  bloc: ^8.1.4
  bloc_concurrency: ^0.2.2

  # Error Handling
  dartz: ^0.10.1

  # Firebase
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.1
  firebase_messaging: ^15.2.2
  firebase_storage: ^12.4.0
  cloud_functions: ^5.2.0
  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.1
  geocoding: ^3.0.0

  # Push Notifications
  flutter_local_notifications: ^18.0.1

  # Dependency Injection
  get_it: ^9.2.1
  injectable: ^2.7.1

  # Networking
  dio: ^5.4.3

  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Routing
  go_router: ^14.1.0

  # JSON
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.20.2
  logger: ^2.3.0
  uuid: ^4.3.3
  url_launcher: ^6.2.5

  # UI
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  table_calendar: ^3.1.0
  qr_flutter: ^4.1.0
  crypto: ^3.0.6

  # Form validation
  formz: ^0.7.0

  # Image
  image_picker: ^1.1.0
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  flutter_riverpod: ^2.6.1
  connectivity_plus: ^7.1.0
  timezone: ^0.9.2
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  permission_handler: ^12.0.1
  skeletonizer: ^2.1.3
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.0.0
  mobile_scanner: ^7.2.0
  google_mlkit_barcode_scanning: ^0.13.0
  device_info_plus: ^12.4.0
  gal: ^1.3.0
  google_generative_ai: ^0.4.7
  xml: ^6.6.1
  html: ^0.15.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2

  # Code Generation
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.2
  hive_generator: ^2.0.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/quick_actions/
    - assets/fonts/
