name: smart_clinic_booking
description: Smart Clinic Booking Mobile App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  lottie: ^3.1.0
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.2

  # Networking
  dio: ^5.4.3

  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Routing
  go_router: ^14.1.0

  # JSON
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.19.0
  logger: ^2.3.0

  # UI
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Form validation
  formz: ^0.7.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2

  # Code Generation
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

 